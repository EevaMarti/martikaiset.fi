<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eeva ja Ossi Martikaisen tutkimus- ja asiantuntijapalvelut Oy</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Nunito', sans-serif;
  background: white;
  color: #222;
}

.container {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.people {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 80px;
  flex: 1;
}

.person {
  text-align: center;
}

.person a {
  text-decoration: none;
  color: inherit;
}

.image {
  width: 260px;
  height: 320px;
  background: #ddd;
  border-radius: 12px;
  transition: 0.3s;
}

.person:hover .image {
  transform: scale(1.03);
}

.name {
  margin-top: 15px;
  font-size: 18px;
  font-weight: 600;
}

.footer {
  background: #6b7280;
  color: white;
  text-align: center;
  padding: 20px;
  letter-spacing: 1px;
}

@media (max-width: 700px) {
  .people {
    flex-direction: column;
    gap: 40px;
    padding-top: 40px;
  }
}

</style>
</head>

<body>

<div class="container">

  <div class="people">

    <div class="person">
      <a href="eeva.html">
        <div class="image"></div>
        <div class="name">Eeva Martikainen</div>
      </a>
    </div>

    <div class="person">
      <a href="ossi.html">
        <div class="image"></div>
        <div class="name">Ossi Martikainen</div>
      </a>
    </div>

  </div>

  <div class="footer">
    Yrityksen nimi
  </div>

</div>

</body>
</html>
